name: Terraform Tests

on:
  pull_request:
  workflow_dispatch:

jobs:
  terraform-unit:
    name: Unit tests (mocked)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.4
      - name: terraform init
        run: terraform init -test-directory=tests/unit
      - name: terraform test
        run: terraform test -test-directory=tests/unit

  terraform-integration:
    name: Integration tests (real AWS, manual dispatch)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-west-2
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.4
      - name: terraform init
        run: terraform init -test-directory=tests/integration
      - name: terraform test
        run: terraform test -test-directory=tests/integration
